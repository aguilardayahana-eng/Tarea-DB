<div class="marcas-container">

  <!-- Search -->
  <div class="search-section">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="🔍 Buscar por nombre o país..."
      class="search-input">
  </div>

  <!-- Header -->
  <div class="page-header">
    <h1>🏷️ Gestión de Marcas</h1>
    <button class="btn btn-primary" (click)="openModal('create')">
      ➕ Nueva Marca
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">⏳ Cargando marcas...</div>

  <!-- Table -->
  <div *ngIf="!loading" class="table-container">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>País</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let marca of marcasFiltradas">
          <td>{{ marca.nombre }}</td>
          <td>{{ marca.pais }}</td>

          <td>
            <button class="btn btn-sm btn-edit" (click)="openModal('edit', marca)">
              ✏️ Editar
            </button>
            <button class="btn btn-sm btn-delete" (click)="deleteMarca(marca._id)">
              🗑️ Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="marcasFiltradas.length === 0" class="empty-state">
      📭 No hay marcas
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <h3>
          {{ modalMode === 'create' ? '➕ Nueva Marca' : '✏️ Editar Marca' }}
        </h3>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>

      <form (ngSubmit)="saveMarca()" #form="ngForm">

        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" [(ngModel)]="selectedMarca.nombre" name="nombre" required>
        </div>

        <div class="form-group">
          <label>País:</label>
          <input type="text" [(ngModel)]="selectedMarca.pais" name="pais" required>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="!form.form.valid">
            💾 Guardar
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
