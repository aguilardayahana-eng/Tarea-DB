<div class="usuarios-container">
  <!-- Search -->
  <div class="search-section">
    <input 
      type="text" 
      [(ngModel)]="searchTerm" 
      placeholder="🔍 Buscar por nombre o email..."
      class="search-input">
  </div>

  <!-- Header -->
  <div class="page-header">
    <h1>👥 Gestión de Usuarios</h1>
    <button class="btn btn-primary" (click)="openModal('create')">
      ➕ Nuevo Usuario
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">⏳ Cargando usuarios...</div>

  <!-- Table -->
  <div *ngIf="!loading" class="table-container">
    <table class="usuarios-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Edad</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let usuario of usuariosFiltrados">
          <td>{{ usuario.nombre }}</td>
          <td>{{ usuario.email }}</td>
          <td>{{ usuario.edad }}</td>
          <td>
            <span class="role-badge" [class]="usuario.rol === 'admin' ? 'admin' : 'cliente'">
              {{ usuario.rol }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-edit" (click)="openModal('edit', usuario)">
              ✏️ Editar
            </button>
            <button class="btn btn-sm btn-delete" (click)="deleteUsuario(usuario._id)">
              🗑️ Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Empty State -->
    <div *ngIf="usuariosFiltrados.length === 0" class="empty-state">
      <p>📭 No hay usuarios para mostrar</p>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="modal-overlay" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ modalMode === 'create' ? '➕ Nuevo Usuario' : '✏️ Editar Usuario' }}</h3>
        <button class="close-btn" (click)="closeModal()">×</button>
      </div>
      
      <form (ngSubmit)="saveUsuario()" #usuarioForm="ngForm">
        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" [(ngModel)]="selectedUsuario.nombre" name="nombre" required>
        </div>
        
        <div class="form-group">
          <label>Email:</label>
          <input type="email" [(ngModel)]="selectedUsuario.email" name="email" required>
        </div>
        
        <div class="form-group">
          <label>Edad:</label>
          <input type="number" [(ngModel)]="selectedUsuario.edad" name="edad" min="18" max="100">
        </div>
        
        <div class="form-group">
          <label>Rol:</label>
          <select [(ngModel)]="selectedUsuario.rol" name="rol">
            <option value="cliente">Cliente</option>
            <option value="admin">Administrador</option>
          </select>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" (click)="closeModal()">
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="!usuarioForm.form.valid">
            💾 Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
