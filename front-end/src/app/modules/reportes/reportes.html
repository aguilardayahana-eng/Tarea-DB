<div class="reportes-container">

  <div class="page-header">
    <h1>📊 Reportes del Sistema</h1>
    <p>Resumen general de la tienda</p>
  </div>

  <!-- Cards -->
  <div class="cards">

    <div class="card">
      <h3>Ventas</h3>
      <div class="value">{{ totalVentas }}</div>
    </div>

    <div class="card">
      <h3>Marcas</h3>
      <div class="value">{{ totalMarcas }}</div>
    </div>

    <div class="card">
      <h3>Prendas</h3>
      <div class="value">{{ totalPrendas }}</div>
    </div>

  </div>

  <!-- Placeholder gráfico -->
  <div class="chart-placeholder">
    📈 Aquí puedes agregar gráficos después (opcional)
  </div>

</div>
